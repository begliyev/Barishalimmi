<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siber Söýgi Protokoly v3.0</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #030002;
            font-family: 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
        }

        /* Siber CRT Tarama Çizgileri */
        body::before {
            content: " ";
            display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 999; background-size: 100% 4px;
            pointer-events: none;
        }

        /* ŞIK TERMİNAL GİRİŞ EKRANI */
        #login-screen {
            position: fixed; width: 100%; height: 100%;
            background: #070105;
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        .terminal-box {
            background: rgba(3, 0, 2, 0.98);
            border: 1px solid #ff0055; padding: 35px 25px; border-radius: 16px;
            text-align: center; width: 100%; max-width: 340px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.25);
        }

        .terminal-header {
            font-size: 10.5pt; font-weight: bold; letter-spacing: 2px;
            margin-bottom: 25px; text-transform: uppercase;
            color: #ff0055; text-shadow: 0 0 8px #ff0055;
        }

        input {
            background: #000; border: 1px solid #ff0055;
            color: #ff007f; padding: 14px; text-align: center;
            font-size: 13pt; font-family: 'Courier New', Courier, monospace;
            width: 100%; border-radius: 8px; outline: none;
            box-shadow: inset 0 0 5px rgba(255, 0, 85, 0.2);
            transition: all 0.3s ease;
        }
        
        input:focus {
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.5), inset 0 0 5px rgba(255, 0, 85, 0.3);
        }

        /* TUVALLER */
        canvas { position: absolute; left: 0; top: 0; pointer-events: none; }
        #matrixCanvas { z-index: 1; }
        #heartCanvas { z-index: 2; }
        
        /* SAMİMİ SÖZ - MERKEZDE PARILDAYAN KATMAN */
        #content-overlay {
            position: absolute; top: 44%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; display: none; opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        #content-overlay.show-perfect {
            display: block; opacity: 1;
        }

        .romantic-text {
            color: #ffffff; font-family: 'Georgia', serif; font-style: italic;
            line-height: 1.6; font-size: 12pt; font-weight: 500;
            text-align: center; width: 180px;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff007f, 0 0 2px #000;
        }

        /* SÜZÜLEN FOTOĞRAFLARIN ANA ALANI */
        #photo-area {
            position: absolute; width: 100%; height: 100%; left: 0; top: 0; z-index: 20;
            pointer-events: none;
        }

        .floating-photo {
            position: absolute;
            border: 1.5px solid #ffffff; border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.35), 0 0 10px rgba(255, 255, 255, 0.15);
            object-fit: cover; width: 105px; height: 135px;
            opacity: 0;
            animation: gloriousFloat 11s ease-in-out forwards;
        }

        @keyframes gloriousFloat {
            0% {
                transform: translate(0, 40px) scale(0.85) rotate(-5deg);
                opacity: 0; filter: brightness(0.6);
            }
            15% {
                opacity: 0.98; filter: brightness(1.05);
                transform: translate(0, 0) scale(1) rotate(var(--r-rot));
            }
            85% {
                opacity: 0.98; filter: brightness(1);
                transform: translate(var(--move-x), var(--move-y)) scale(1.03) rotate(var(--r-rot));
            }
            100% {
                transform: translate(var(--move-x), calc(var(--move-y) - 40px)) scale(0.85) rotate(var(--r-rot));
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="terminal-box">
            <div class="terminal-header">🔒 SIBER HOWPSUZLYK ULGAMY</div>
            <input type="password" id="password" onkeypress="checkPassword(event)" placeholder="Şifre..." inputmode="text">
            <div style="margin-top: 18px; font-size: 8.5pt; color: rgba(255, 0, 85, 0.5); letter-spacing: 1px;">Açar söz: Leýli</div>
        </div>
    </div>

    <canvas id="matrixCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>
    <div id="photo-area"></div>

    <div id="content-overlay">
        <div class="romantic-text">
            Barışalymmy,<br>kalbimiň şazadasy? 🌹✨
        </div>
    </div>

    <script>
        const mCanvas = document.getElementById('matrixCanvas');
        const mCtx = mCanvas.getContext('2d');
        const hCanvas = document.getElementById('heartCanvas');
        const hCtx = hCanvas.getContext('2d');

        function initCanvases() {
            mCanvas.width = hCanvas.width = window.innerWidth;
            mCanvas.height = hCanvas.height = window.innerHeight;
        }
        initCanvases();

        // MATRIX DATA
        const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ💕✨🌸🔮💎⚡";
        const fontSize = 13;
        let columns = mCanvas.width / fontSize;
        let rainDrops = Array(Math.floor(columns)).fill(1);

        // HEART PARTICLES DESIGN
        let particles = [];
        let heartX = window.innerWidth / 2;
        let heartY = window.innerHeight * 0.44;
        let currentScale = window.innerWidth < 450 ? 6.5 : 8.5; 

        window.addEventListener('resize', () => {
            initCanvases();
            heartX = window.innerWidth / 2;
            heartY = window.innerHeight * 0.44;
            currentScale = window.innerWidth < 450 ? 6.5 : 8.5;
            columns = mCanvas.width / fontSize;
            rainDrops = Array(Math.floor(columns)).fill(1);
            generateHeartParticles();
        });

        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        function generateHeartParticles() {
            particles = [];
            for (let i = 0; i < 180; i++) {
                let t = (i / 180) * Math.PI * 2;
                let point = getHeartPoint(t);
                particles.push({
                    baseX: heartX + point.x * currentScale,
                    baseY: heartY + point.y * currentScale,
                    x: heartX + point.x * currentScale,
                    y: heartY + point.y * currentScale,
                    speed: 0.04 + Math.random() * 0.04,
                    angle: Math.random() * Math.PI * 2,
                    size: 1.2 + Math.random() * 1.5
                });
            }
        }

        // MATRIX AKIŞ MOTORU (KALP ETRAFINDA BÜKÜLEN ALGORİTMA)
        function drawMatrix() {
            mCtx.fillStyle = 'rgba(3, 0, 2, 0.08)';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.font = 'bold ' + fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                if (Math.random() > 0.15) {
                    let cx = i * fontSize;
                    let cy = rainDrops[i] * fontSize;

                    let dx = cx - heartX;
                    let dy = cy - heartY;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let clearRadius = currentScale * 17; 

                    if (dist < clearRadius) {
                        let angle = Math.atan2(dy, dx);
                        cx = heartX + Math.cos(angle) * clearRadius;
                        rainDrops[i] += 3; 
                    }

                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    
                    if (Math.random() > 0.97) {
                        mCtx.fillStyle = '#ffffff';
                    } else if (Math.random() > 0.75) {
                        mCtx.fillStyle = '#ff66b2';
                    } else {
                        mCtx.fillStyle = '#ff0055';
                    }

                    mCtx.fillText(text, cx, cy);

                    if (rainDrops[i] * fontSize > mCanvas.height && Math.random() > 0.98) {
                        rainDrops[i] = 0;
                    }
                    rainDrops[i]++;
                }
            }
        }

        // CANLI PARÇACIKLI KALP MOTORU
        function drawHeart() {
            hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.angle += p.speed;
                p.x = p.baseX + Math.sin(p.angle) * 2.5;
                p.y = p.baseY + Math.cos(p.angle) * 2.5;

                hCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                hCtx.shadowBlur = 8;
                hCtx.shadowColor = '#ff0055';
                
                hCtx.beginPath();
                hCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                hCtx.fill();
            }
            hCtx.shadowBlur = 0; 
        }

        function engineLoop() {
            drawMatrix();
            drawHeart();
            requestAnimationFrame(engineLoop);
        }

        function checkPassword(event) {
            if (event.key === 'Enter') {
                const pass = document.getElementById('password').value.trim().toLowerCase();
                if (pass === 'leýli' || pass === 'leyli') { 
                    const gate = document.getElementById('login-screen');
                    gate.style.opacity = '0';
                    document.getElementById('password').blur();

                    setTimeout(() => {
                        gate.remove(); 
                        document.getElementById('content-overlay').classList.add('show-perfect');
                        
                        generateHeartParticles();
                        engineLoop(); 
                        startGloriousPhotoStream(); 
                    }, 800);
                } else {
                    alert('ÝALŇYŞ AÇAR SÖZ!');
                }
            }
        }

        // SENİN DOĞRUDAN RESİM LİNKLERİN BURAYA KUSURSUZCA ENTEGRE EDİLDİ REİS
        const photoUrls = [
            'https://i.ibb.co/C50zxPD4/watermarked-img-10925359437932352695.png',
            'https://i.ibb.co/r2FbsC7Z/Screenshot-2026-06-05-23-58-56-700-com-android-chrome.jpg',
            'https://i.ibb.co/FbL2mG2t/Screenshot-2026-06-06-00-07-21-591-com-android-chrome.jpg',
            'https://i.ibb.co/xSxX9nTw/Screenshot-2026-06-06-00-09-14-448-com-android-chrome.jpg',
            'https://i.ibb.co/sdbyZhzB/Screenshot-2026-06-06-00-10-35-677-com-android-chrome.jpg',
            'https://i.ibb.co/pBNyxYng/watermarked-img-10925359437932352695.png'
        ];

        // FOTOĞRAFLARI SAĞA VE SOLA GÜVENLİ ŞEKİLDE SÜZDÜREN MOTOR
        function startGloriousPhotoStream() {
            setInterval(() => {
                const img = document.createElement('img');
                img.src = photoUrls[Math.floor(Math.random() * photoUrls.length)];
                img.className = 'floating-photo';
                
                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;
                
                let calculatedLeft = 0;
                let calculatedTop = Math.random() * (screenHeight * 0.65) + (screenHeight * 0.08);
                
                let edgeOffset = window.innerWidth < 450 ? 115 : 145;
                if (Math.random() > 0.5) {
                    calculatedLeft = Math.random() * (screenWidth / 2 - edgeOffset) + 10;
                } else {
                    calculatedLeft = Math.random() * (screenWidth / 2 - edgeOffset) + (screenWidth / 2 + (edgeOffset - 20));
                }
                
                const moveX = (Math.random() * 30 - 15) + 'px';
                const moveY = (Math.random() * -45 - 10) + 'px'; 
                const rRot = (Math.random() * 12 - 6) + 'deg';
                
                img.style.setProperty('--move-x', moveX);
                img.style.setProperty('--move-y', moveY);
                img.style.setProperty('--r-rot', rRot);
                
                img.style.left = calculatedLeft + 'px';
                img.style.top = calculatedTop + 'px';

                document.getElementById('photo-area').appendChild(img);
                
                setTimeout(() => img.remove(), 10800);
            }, 3000);
        }
    </script>
</body>
  </html>
